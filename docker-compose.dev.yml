# Development overrides – use explicitly via `make docker` or:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Do NOT commit secrets in this file.
services:
  statuspage:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
    volumes:
      - .:/app            # live code reload
      - /app/data         # keep SQLite data separate from bind mount
    ports:
      - "8000:8000"
