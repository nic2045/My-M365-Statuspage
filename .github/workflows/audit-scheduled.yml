name: Scheduled Security Audit

on:
  schedule:
    # Every Monday at 07:00 CET (06:00 UTC)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  issues: write   # to open a GitHub Issue on findings

jobs:
  pip-audit:
    name: pip-audit + issue on findings
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - name: Run pip-audit (markdown output)
        id: audit
        run: |
          set +e
          uvx pip-audit \
            --requirement requirements.txt \
            --format markdown \
            --progress-spinner off \
            > audit-report.md 2>audit-error.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ -s audit-error.log ]; then
            echo "--- pip-audit stderr ---"
            cat audit-error.log
          fi
          cat audit-report.md
          exit 0   # never fail the step; we handle findings via issue

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: audit-report.md
          retention-days: 90

      - name: Open issue if vulnerabilities found
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const title = `[Security] pip-audit Findings – ${today}`;

            // Check for existing open issue with same title prefix to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const duplicate = existing.data.find(i => i.title.startsWith('[Security] pip-audit'));
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number} – skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Vulnerable Python dependencies detected',
                '',
                'The weekly `pip-audit` scan found vulnerabilities.',
                'Please update `requirements.txt` or pin the affected packages.',
                '',
                '### Audit Report',
                '',
                report,
                '',
                `_Automatically created by [Scheduled Security Audit](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
              ].join('\n'),
              labels: ['security', 'dependencies'],
            });
