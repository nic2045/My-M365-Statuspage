schemaVersion: "2.0.0"

# ── Image metadata ────────────────────────────────────────────────────────────
metadataTest:
  exposedPorts: ["8000"]
  user: "appuser"
  cmd:
    - "uvicorn"
    - "app.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
    - "--workers"
    - "1"
  envVars:
    - key: PYTHONDONTWRITEBYTECODE
      value: "1"
    - key: PYTHONUNBUFFERED
      value: "1"

# ── Required files and directories ───────────────────────────────────────────
fileExistenceTests:
  - name: "app package"
    path: "/app/app"
    shouldExist: true
    isDirectory: true

  - name: "templates directory"
    path: "/app/templates"
    shouldExist: true
    isDirectory: true

  - name: "static directory"
    path: "/app/static"
    shouldExist: true
    isDirectory: true

  - name: "data directory"
    path: "/app/data"
    shouldExist: true
    isDirectory: true

  - name: "main.py"
    path: "/app/app/main.py"
    shouldExist: true

  - name: "base.html"
    path: "/app/templates/base.html"
    shouldExist: true

  # Security: no secrets or VCS data in the image
  - name: "no .env"
    path: "/app/.env"
    shouldExist: false

  - name: "no .env.example"
    path: "/app/.env.example"
    shouldExist: false

  - name: "no .git"
    path: "/app/.git"
    shouldExist: false

# ── Runtime sanity checks ─────────────────────────────────────────────────────
commandTests:
  - name: "uvicorn is installed"
    command: "uvicorn"
    args: ["--version"]
    exitCode: 0

  - name: "python can import the app"
    command: "python"
    args:
      - "-c"
      - |
        import os, sys
        os.environ.setdefault("AZURE_TENANT_ID", "dummy")
        os.environ.setdefault("AZURE_CLIENT_ID", "dummy")
        os.environ.setdefault("AZURE_CLIENT_SECRET", "dummy")
        os.environ.setdefault("AZURE_REDIRECT_URI", "http://localhost:8000/auth/callback")
        os.environ.setdefault("SECRET_KEY", "00" * 32)
        os.environ.setdefault("DATABASE_URL", "sqlite+aiosqlite:///./data/statuspage.db")
        from app.main import app
        routes = [r.path for r in app.routes]
        assert "/api/v1/health" in routes, f"health route missing: {routes}"
        assert "/embed" in routes, f"embed route missing"
        print("import OK, routes:", routes)
    exitCode: 0
    envVars:
      - key: PYTHONPATH
        value: "/app"
