<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ page_title | default("M365 Dienststatus") }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              DEFAULT: '#005EA8',
              dark:    '#004A87',
              light:   '#1A73BE',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <meta name="theme-color" content="#005EA8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="M365 Status" />
  <style>
    [title] { cursor: default; }
    .bar-tooltip:hover { opacity: 0.75; }
    /* Safe-area padding for notched iOS devices in standalone mode */
    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 font-sans antialiased transition-colors duration-200">

  <!-- Navigation -->
  <nav class="bg-brand dark:bg-brand-dark border-b border-brand-dark sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <!-- M365 four-square icon -->
        <svg class="w-6 h-6" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <rect x="1"  y="1"  width="10" height="10" rx="1.5" fill="#f35325"/>
          <rect x="13" y="1"  width="10" height="10" rx="1.5" fill="#81bc06"/>
          <rect x="1"  y="13" width="10" height="10" rx="1.5" fill="#05a6f0"/>
          <rect x="13" y="13" width="10" height="10" rx="1.5" fill="#ffba08"/>
        </svg>
        <span class="font-medium text-white tracking-tight">
          {{ page_title | default("M365 Dienststatus") }}
        </span>
      </div>

      <div class="flex items-center gap-3">
        <!-- Dark mode toggle -->
        <button
          id="theme-toggle"
          aria-label="Farbschema wechseln"
          class="p-1.5 rounded-md text-white/70 hover:text-white hover:bg-white/10 transition-colors"
        >
          <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/>
          </svg>
          <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 12c0 5.385 4.365 9.75 9.75 9.75 4.418 0 8.166-2.942 9.502-7z"/>
          </svg>
        </button>

        {% if user is defined and user %}
        <span class="text-sm text-white/60 hidden sm:block">
          {{ user.get("name") or user.get("preferred_username") or user.get("email", "") }}
        </span>
        <a
          href="/admin"
          class="text-sm font-medium text-white/80 hover:text-white transition-colors"
        >{{ L["admin.title"] }}</a>
        <a
          href="/auth/logout"
          class="text-sm font-medium text-white/80 hover:text-white transition-colors"
        >{{ L["page.logout"] }}</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="{% block container_class %}max-w-4xl{% endblock %} mx-auto px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- PWA install prompt (shown only after browser fires beforeinstallprompt) -->
  <button id="pwa-install-btn"
          aria-label="App installieren"
          class="hidden fixed bottom-4 right-4 z-40 inline-flex items-center gap-1.5 px-3 py-2 rounded-full bg-brand text-white text-sm font-medium shadow-lg hover:bg-brand-dark transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4m-8 8h8"/>
    </svg>
    <span>Installieren</span>
  </button>

  <script>
    // Dark mode toggle (persists to localStorage)
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

  <script>
    // Register service worker (served from origin scope via /sw.js route)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed:', err);
        });
      });
    }

    // PWA install prompt — caught by beforeinstallprompt, shown as floating button
    let deferredPrompt = null;
    const installBtn = document.getElementById('pwa-install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installBtn && localStorage.getItem('pwa-install-dismissed') !== '1') {
        installBtn.classList.remove('hidden');
      }
    });
    installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'dismissed') {
        localStorage.setItem('pwa-install-dismissed', '1');
      }
      installBtn.classList.add('hidden');
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', () => {
      installBtn?.classList.add('hidden');
      localStorage.setItem('pwa-installed', '1');
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
