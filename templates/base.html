<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ page_title | default("M365 Dienststatus") }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              DEFAULT: '#005EA8',
              dark:    '#004A87',
              light:   '#1A73BE',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <meta name="theme-color" content="#005EA8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="M365 Status" />
  <style>
    [title] { cursor: default; }
    .bar-tooltip:hover { opacity: 0.75; }
    /* Safe-area padding for notched iOS devices in standalone mode */
    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 font-sans antialiased transition-colors duration-200">

  <!-- Navigation -->
  <nav class="bg-brand dark:bg-brand-dark border-b border-brand-dark sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <!-- M365 four-square icon -->
        <svg class="w-6 h-6" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <rect x="1"  y="1"  width="10" height="10" rx="1.5" fill="#f35325"/>
          <rect x="13" y="1"  width="10" height="10" rx="1.5" fill="#81bc06"/>
          <rect x="1"  y="13" width="10" height="10" rx="1.5" fill="#05a6f0"/>
          <rect x="13" y="13" width="10" height="10" rx="1.5" fill="#ffba08"/>
        </svg>
        <span class="font-medium text-white tracking-tight">
          {{ page_title | default("M365 Dienststatus") }}
        </span>
      </div>

      <div class="flex items-center gap-3">
        <!-- Dark mode toggle -->
        <button
          id="theme-toggle"
          aria-label="Farbschema wechseln"
          class="p-1.5 rounded-md text-white/70 hover:text-white hover:bg-white/10 transition-colors"
        >
          <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/>
          </svg>
          <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 12c0 5.385 4.365 9.75 9.75 9.75 4.418 0 8.166-2.942 9.502-7z"/>
          </svg>
        </button>

        {% if user is defined and user %}
        <span class="text-sm text-white/60 hidden sm:block">
          {{ user.get("name") or user.get("preferred_username") or user.get("email", "") }}
        </span>
        <a
          href="/admin"
          class="text-sm font-medium text-white/80 hover:text-white transition-colors"
        >{{ L["admin.title"] }}</a>
        <a
          href="/auth/logout"
          class="text-sm font-medium text-white/80 hover:text-white transition-colors"
        >{{ L["page.logout"] }}</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="{% block container_class %}max-w-4xl{% endblock %} mx-auto px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Bar-hover tooltip: floats next to cursor, lists up to 3 incidents ──── -->
  <div id="bar-tooltip"
       class="fixed z-50 hidden pointer-events-none max-w-xs bg-gray-900 text-white text-xs rounded-lg shadow-xl px-3 py-2 border border-gray-700 dark:bg-gray-800 dark:border-gray-700"
       role="tooltip">
    <div id="bar-tooltip-head" class="font-medium mb-1"></div>
    <div id="bar-tooltip-body" class="text-gray-200"></div>
    <div id="bar-tooltip-incidents" class="mt-1.5 space-y-1"></div>
    <div id="bar-tooltip-more" class="text-[10px] text-gray-400 mt-1 hidden"></div>
  </div>

  <!-- ── Day-detail modal: opened by clicking a 90-day uptime bar ───────────── -->
  <div id="day-modal" role="dialog" aria-modal="true" aria-labelledby="day-modal-title"
       class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div data-day-modal-backdrop class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-gray-900 rounded-2xl shadow-2xl max-w-md w-full border border-gray-100 dark:border-gray-800 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100 dark:border-gray-800 flex items-start justify-between gap-3">
        <div class="min-w-0 flex items-center gap-2">
          <button id="day-modal-back" type="button" aria-label="Zurück zur Übersicht"
                  class="hidden shrink-0 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 -ml-1 p-1 rounded transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
          <span id="day-modal-dot" class="w-2.5 h-2.5 rounded-full shrink-0"></span>
          <div class="min-w-0">
            <h3 id="day-modal-title" class="text-sm font-semibold text-gray-900 dark:text-white leading-tight"></h3>
            <p id="day-modal-sub" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5"></p>
          </div>
        </div>
        <button type="button" data-day-modal-close aria-label="Schließen"
                class="shrink-0 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 -m-1 p-1 rounded">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>
      <div class="px-5 py-4">
        <div id="day-modal-status-row" class="inline-flex items-center gap-2 px-2.5 py-1 rounded-full text-xs font-medium mb-3"></div>
        <p id="day-modal-body" class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed"></p>
        <div id="day-modal-incidents" class="mt-3 space-y-2"></div>
      </div>
    </div>
  </div>

  <!-- PWA install prompt (shown only after browser fires beforeinstallprompt) -->
  <button id="pwa-install-btn"
          aria-label="App installieren"
          class="hidden fixed bottom-4 right-4 z-40 inline-flex items-center gap-1.5 px-3 py-2 rounded-full bg-brand text-white text-sm font-medium shadow-lg hover:bg-brand-dark transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4m-8 8h8"/>
    </svg>
    <span>Installieren</span>
  </button>

  <script>
    // Dark mode toggle (persists to localStorage)
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

  <script>
    // Day-detail modal: opens when a 90-day uptime bar is clicked
    (function () {
      const modal = document.getElementById('day-modal');
      if (!modal) return;
      const title = document.getElementById('day-modal-title');
      const sub = document.getElementById('day-modal-sub');
      const dot = document.getElementById('day-modal-dot');
      const statusRow = document.getElementById('day-modal-status-row');
      const body = document.getElementById('day-modal-body');
      const incidentsBox = document.getElementById('day-modal-incidents');
      const backBtn = document.getElementById('day-modal-back');

      let lastBar = null;

      const STATUS_STYLE = {
        operational: { dot: 'bg-emerald-500', badge: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300', body: 'Keine Vorfälle an diesem Tag — Dienst lief normal.' },
        degraded:    { dot: 'bg-amber-500',   badge: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',       body: 'Eingeschränkte Verfügbarkeit an diesem Tag.' },
        interrupted: { dot: 'bg-red-500',     badge: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300',               body: 'Dienstunterbrechung an diesem Tag.' },
        no_data:     { dot: 'bg-gray-300',    badge: 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400',              body: 'Keine Datenpunkte für diesen Tag verfügbar.' },
        unknown:     { dot: 'bg-gray-400',    badge: 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400',              body: 'Status unbekannt.' },
      };

      const CLASS_STYLE = {
        incident:    { border: 'border-l-red-400',   badge: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400',     label: 'Störung' },
        advisory:    { border: 'border-l-amber-400', badge: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400', label: 'Hinweis' },
        maintenance: { border: 'border-l-blue-400',  badge: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400',  label: 'Wartung' },
      };

      function open(btn) {
        lastBar = btn;
        backBtn.classList.add('hidden');

        const date = btn.dataset.date;
        const dateLabel = btn.dataset.dateLabel;
        const status = btn.dataset.status;
        const statusLabel = btn.dataset.statusLabel;
        const service = btn.dataset.service;
        const style = STATUS_STYLE[status] || STATUS_STYLE.unknown;

        title.textContent = service;
        sub.textContent = dateLabel;
        dot.className = 'w-2.5 h-2.5 rounded-full shrink-0 ' + style.dot;
        statusRow.className = 'inline-flex items-center gap-2 px-2.5 py-1 rounded-full text-xs font-medium mb-3 ' + style.badge;
        statusRow.innerHTML = '<span class="w-1.5 h-1.5 rounded-full ' + style.dot + '"></span>' + statusLabel;
        body.textContent = style.body;

        // Look up incidents covering this date by scanning incident entries
        // on the page (active cards + history). Click on any opens the full
        // incident detail in the same modal — no page navigation needed.
        incidentsBox.innerHTML = '';
        const matching = findIncidentsCoveringDate(service, date);
        if (matching.length > 0) {
          const header = document.createElement('p');
          header.className = 'text-xs font-medium uppercase tracking-wide text-gray-400 dark:text-gray-500 mb-2';
          header.textContent = 'Zugehörige Einträge';
          incidentsBox.appendChild(header);
          matching.forEach((inc) => {
            const cs = CLASS_STYLE[inc.classificationRaw] || {};
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'w-full text-left block pl-3 pr-3 py-2 rounded-lg border border-gray-100 dark:border-gray-800 border-l-4 '
              + (cs.border || 'border-l-gray-300')
              + ' hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors';
            let badgeHtml = '';
            if (cs.badge) {
              badgeHtml = '<span class="inline-flex items-center px-1.5 py-0 rounded text-[10px] font-medium ' + cs.badge + ' ml-1.5">' + (cs.label || inc.classificationRaw) + '</span>';
            }
            row.innerHTML = '<span class="text-sm font-medium text-gray-800 dark:text-gray-200">' + inc.title + badgeHtml + '</span>'
              + '<span class="block text-xs text-gray-400 dark:text-gray-500 mt-0.5">' + inc.meta + '</span>';
            row.addEventListener('click', (ev) => {
              ev.preventDefault();
              if (inc.element) openIncidentCard(inc.element);
            });
            incidentsBox.appendChild(row);
          });
        }

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.classList.add('overflow-hidden');
      }

      function close() {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.classList.remove('overflow-hidden');
        lastBar = null;
      }

      // Find incident entries on the page whose [start..end] date range covers `date`
      // Returns [{title, meta, classificationRaw, element}]. Uses [data-incident-entry] attributes.
      function findIncidentsCoveringDate(service, date) {
        const all = document.querySelectorAll('[data-incident-entry]');
        const out = [];
        all.forEach((el) => {
          if (el.dataset.service && el.dataset.service !== service) return;
          const start = el.dataset.start;
          const end = el.dataset.end || new Date().toISOString().slice(0, 10);
          if (start && date >= start && date <= end) {
            out.push({
              title: el.dataset.title || '(ohne Titel)',
              meta: el.dataset.meta || (el.dataset.statusLabel ? el.dataset.statusLabel + ' · ' + (el.dataset.service || '') : (el.dataset.service || '')),
              classificationRaw: el.dataset.classificationRaw || '',
              element: el,
            });
          }
        });
        return out;
      }

      function openIncidentCard(card) {
        const status = card.dataset.status || 'unknown';
        const style = STATUS_STYLE[status] || STATUS_STYLE.unknown;

        title.textContent = card.dataset.title || '';
        sub.textContent = card.dataset.service || '';
        dot.className = 'w-2.5 h-2.5 rounded-full shrink-0 ' + style.dot;

        // Show back button only when we drilled in from a day overview
        if (lastBar) {
          backBtn.classList.remove('hidden');
        }

        // Status row: combine classification + severity + state
        const chips = [];
        if (card.dataset.classification) chips.push(card.dataset.classification);
        if (card.dataset.severityLabel) chips.push(card.dataset.severityLabel);
        if (card.dataset.statusLabel) chips.push(card.dataset.statusLabel);
        statusRow.className = 'inline-flex items-center gap-2 px-2.5 py-1 rounded-full text-xs font-medium mb-3 ' + style.badge;
        statusRow.innerHTML = '<span class="w-1.5 h-1.5 rounded-full ' + style.dot + '"></span>' + chips.join(' · ');

        body.innerHTML = '';
        if (card.dataset.since) {
          const p = document.createElement('p');
          p.className = 'text-xs text-gray-500 dark:text-gray-400 mb-2';
          p.innerHTML = '<span class="font-medium">Seit:</span> ' + card.dataset.since;
          body.appendChild(p);
        }
        if (card.dataset.description) {
          const desc = document.createElement('p');
          desc.className = 'text-sm text-gray-700 dark:text-gray-300 leading-relaxed whitespace-pre-line';
          desc.textContent = card.dataset.description;
          body.appendChild(desc);
        } else {
          const p = document.createElement('p');
          p.className = 'text-sm text-gray-500 dark:text-gray-400 italic';
          p.textContent = 'Keine weiteren Details verfügbar.';
          body.appendChild(p);
        }

        incidentsBox.innerHTML = '';
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.classList.add('overflow-hidden');
      }

      backBtn.addEventListener('click', () => {
        if (lastBar) open(lastBar);
      });

      // ── Bar hover tooltip ────────────────────────────────────────────────
      const tooltip = document.getElementById('bar-tooltip');
      const tHead = document.getElementById('bar-tooltip-head');
      const tBody = document.getElementById('bar-tooltip-body');
      const tIncidents = document.getElementById('bar-tooltip-incidents');
      const tMore = document.getElementById('bar-tooltip-more');

      function showTooltip(bar, evt) {
        const dateLabel = bar.dataset.dateLabel;
        const statusLabel = bar.dataset.statusLabel;
        const service = bar.dataset.service;
        const status = bar.dataset.status;
        const style = STATUS_STYLE[status] || STATUS_STYLE.unknown;

        tHead.textContent = service + ' · ' + dateLabel;
        tBody.innerHTML = '<span class="inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full ' + style.dot + '"></span>' + statusLabel + '</span>';

        const matching = findIncidentsCoveringDate(service, bar.dataset.date);
        tIncidents.innerHTML = '';
        if (matching.length > 0) {
          const visible = matching.slice(0, 3);
          visible.forEach((inc) => {
            const row = document.createElement('div');
            row.className = 'text-[11px] text-gray-100 truncate';
            row.textContent = '• ' + inc.title;
            tIncidents.appendChild(row);
          });
          if (matching.length > 3) {
            tMore.textContent = '+' + (matching.length - 3) + ' weitere — klicken für Details';
            tMore.classList.remove('hidden');
          } else {
            tMore.textContent = 'Klicken für Details';
            tMore.classList.remove('hidden');
          }
        } else {
          tMore.classList.add('hidden');
        }

        tooltip.classList.remove('hidden');
        positionTooltip(evt);
      }

      function positionTooltip(evt) {
        const rect = tooltip.getBoundingClientRect();
        const margin = 12;
        let x = evt.clientX + margin;
        let y = evt.clientY + margin;
        if (x + rect.width > window.innerWidth - 8) x = window.innerWidth - rect.width - 8;
        if (y + rect.height > window.innerHeight - 8) y = evt.clientY - rect.height - margin;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      }

      function hideTooltip() {
        tooltip.classList.add('hidden');
      }

      document.addEventListener('mouseover', (e) => {
        const bar = e.target.closest('[data-day-bar]');
        if (bar) showTooltip(bar, e);
      });
      document.addEventListener('mousemove', (e) => {
        if (!tooltip.classList.contains('hidden')) positionTooltip(e);
      });
      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('[data-day-bar]') && !e.relatedTarget?.closest('[data-day-bar]')) {
          hideTooltip();
        }
      });

      document.addEventListener('click', (e) => {
        // Day bars take priority over incident cards (they're inside service cards)
        const bar = e.target.closest('[data-day-bar]');
        if (bar) {
          e.preventDefault();
          hideTooltip();
          open(bar);
          return;
        }
        const card = e.target.closest('[data-incident-card]');
        if (card && !e.target.closest('a, button, summary')) {
          openIncidentCard(card);
          return;
        }
        if (e.target.closest('[data-day-modal-close], [data-day-modal-backdrop]')) {
          close();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !modal.classList.contains('hidden')) close();
        // Space/Enter on focused incident card opens modal
        if ((e.key === 'Enter' || e.key === ' ') && document.activeElement?.matches('[data-incident-card]')) {
          e.preventDefault();
          openIncidentCard(document.activeElement);
        }
      });
    })();
  </script>

  <script>
    // Register service worker (served from origin scope via /sw.js route)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed:', err);
        });
      });
    }

    // PWA install prompt — caught by beforeinstallprompt, shown as floating button
    let deferredPrompt = null;
    const installBtn = document.getElementById('pwa-install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installBtn && localStorage.getItem('pwa-install-dismissed') !== '1') {
        installBtn.classList.remove('hidden');
      }
    });
    installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'dismissed') {
        localStorage.setItem('pwa-install-dismissed', '1');
      }
      installBtn.classList.add('hidden');
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', () => {
      installBtn?.classList.add('hidden');
      localStorage.setItem('pwa-installed', '1');
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
